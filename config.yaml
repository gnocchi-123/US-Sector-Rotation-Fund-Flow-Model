# srm 설정 — 모든 초기값은 sector_rotation_model.py 프로토타입에서 그대로 가져왔다.
# 임의로 새 값을 만들지 말 것. 값 변경은 ROADMAP.md M4(휩소 리포트) 등 근거가 생긴 뒤에.

tickers:
  benchmark: SPY

  # 섹터 ETF: 티커 -> 표시 이름
  sectors:
    XLK: "Technology"
    XLF: "Financials"
    XLV: "Health Care"
    XLY: "Cons. Disc."
    XLP: "Cons. Staples"
    XLE: "Energy"
    XLI: "Industrials"
    XLB: "Materials"
    XLU: "Utilities"
    XLRE: "Real Estate"
    XLC: "Communication"

  # 위험선호 페어: 이름 -> [분자, 분모]
  risk_pairs:
    SmallVsLarge: [IWM, SPY]
    EqualVsCap: [RSP, SPY]
    CycVsDef: [XLY, XLP]
    CreditRisk: [HYG, LQD]
    GrowthVsValue: [VUG, VTV]

  # 거시 참고 지표: 티커 -> 표시 이름
  macro:
    "^TNX": "10Y Yield"
    USO: "Oil"
    GLD: "Gold"
    UUP: "Dollar"
    "^VIX": "VIX"

windows:
  # Layer 1 (RRG): RS-Ratio / RS-Momentum 롤링 z-score 윈도우
  rs_window: 14
  mom_window: 14
  # Layer 2 (위험선호): 비율 페어 추세 판정용 이동평균
  risk_ma: 20
  # Layer 2: 이동평균 '기울기' 판정 lookback — sma 마지막 값을 마지막에서 N번째 값
  # (= N-1봉 전)과 비교한다. 프로토타입의 iloc[-5] 그대로.
  risk_slope: 5
  # Layer 3 (추세): 1차 추세 판정용 단/장기 이동평균
  trend_fast: 50
  trend_slow: 200
  # [4] 거시 참고의 변화율 lookback — 마지막 봉을 마지막에서 N번째 봉(= N-1봉 전)과
  # 비교한다. 프로토타입의 iloc[-5] 그대로.
  macro_lookback: 5

weights:
  # 종합 점수 = quad_flow + rotation 부호 + trend (결정 2)
  # 의도된 편향: Improving(+2) > Leading(+1).
  # "이미 주도 중인 곳보다 막 유입이 시작된 이른 신호를 더 높게 친다"는 본 시스템의
  # 성격을 반영한 것으로, 모멘텀 추종이 아니다.
  quad_flow:
    Improving: 2
    Leading: 1
    Weakening: -1
    Lagging: -2

  # RS-Momentum의 직전 대비 변화 방향(회전) 점수
  rotation:
    up: 0.5
    down: -0.5
    flat: 0.0

  # Layer 3 추세 점수 (trend_gate가 OFF일 때 단순 가중합에 더해진다)
  trend:
    Uptrend: 1
    Neutral: 0
    Downtrend: -1
    "n/a": 0

  # 추세 게이트 토글. 기본 OFF(프로토타입과 동일한 단순 가중합).
  # ON이어도 Improving 분면은 강등하지 않는다(이른 신호라 추세가 Downtrend인 게 정상, 결정 3).
  # 게이트 기본값 채택과 강등 규칙 확정은 M4의 휩소 실측 이후로 미룬다.
  trend_gate: false

data:
  # yfinance 기본 다운로드 파라미터 (프로토타입 sector_rotation_model.py 기본값)
  period: "2y"
  interval: "1wk"

thresholds:
  # 위험선호 종합 판정 (페어 점수 합산 기준)
  risk_on: 2
  risk_off: -2

# --- M3: 선행지표 (옵션 섹션 — 없거나 비어 있으면 사이클 분석을 건너뛴다) ---
fred:
  # API 키는 환경변수 FRED_API_KEY에서만 읽는다. 이 파일에 키를 쓰지 말 것.
  # ISM PMI(NAPM)는 라이선스 문제로 FRED에서 제거됐고, 무료 대체 경로(DBnomics 미러 등)도
  # 2026-06 조사 결과 전부 손상/중단됨. 같은 성격(제조업 서베이 확산지수)의 공공 지표인
  # 지역 연준 서베이 2종(필라델피아/뉴욕)으로 그 역할을 대신한다. 지역 표본이라는 한계가
  # 있어 2종을 함께 사용하며, 수준은 z-score로 정규화되므로 ISM(50 기준)과의 스케일 차이는
  # 판정에 영향 없음.
  # higher_is: 값이 높을수록 어느 쪽 신호인지 (expansion | contraction).
  # 선행지표는 발표 지연·사후 개정이 있어 최신 경제 상태와 다를 수 있다(후행성 한계).
  series:
    T10Y2Y: { name: "10Y-2Y Term Spread", higher_is: expansion }
    ICSA: { name: "Initial Jobless Claims", higher_is: contraction }
    PERMIT: { name: "Building Permits", higher_is: expansion }
    UMCSENT: { name: "Consumer Sentiment (UMich)", higher_is: expansion }
    AWHMAN: { name: "Avg Weekly Hours, Mfg", higher_is: expansion }
    GACDFSA066MSFRBPHI: { name: "Philly Fed Mfg Survey", higher_is: expansion }
    GACDISA066MSFRBNY: { name: "Empire State Mfg Survey", higher_is: expansion }
  # 레벨 z-score 산출에 쓰는 다운로드 이력 길이(년).
  # cycle.level_window(120개월=10년)와 같으면 롤링 윈도우가 항상 불완전(min_periods)하게
  # 계산되므로, 윈도우보다 넉넉히 받아 "역사 대비 수준" 판정을 안정시킨다.
  period_years: 15
  # 키 불필요 보조 소스(DBnomics). 비우면 비활성.
  # ISM_PMI 미러는 2025-09부터 값 손상(≈10) + 2026-01 이후 갱신 정체가 실측 확인되어 제거함.
  # (갱신만 재개되면 stale 가드를 통과해 손상값이 z-score를 오염시킬 수 있었음.)
  dbnomics: {}
  # 마지막 관측이 이보다 오래된(개월) 시리즈는 사이클 판정에서 제외
  stale_months: 4

cycle:
  # 방향 판정: 최근 N개월 변화의 부호
  trend_window: 6
  # 수준 판정: 레벨 z-score 롤링 윈도우(개월)
  level_window: 120
  # 유효 지표가 이 미만이면 'Unknown (데이터 부족)'으로 degrade
  min_indicators: 2
  # 국면별 '역사적으로 정합적이라고 알려진' 섹터군 — 참고용 맥락 정보이며 추천이 아님.
  phase_sectors:
    Recovery: [XLY, XLF, XLI, XLB, XLRE]
    Expansion: [XLK, XLC, XLI, XLF]
    Slowdown: [XLE, XLV, XLP, XLU]
    Contraction: [XLP, XLU, XLV]

# --- M4: 백테스트(신호 안정성 실측) 옵션 섹션 — 없으면 기본값으로 동작 ---
# 수익률 백테스트가 아니다. '신호 상태 변화'만 기록해 휩소(빠른 번복) 빈도를 측정한다.
backtest:
  # 휩소 판정: 분면 전환 후 N봉 내에 직전 분면으로 복귀하면 휩소로 센다
  horizon: 4
  # 이력 추적에 필요한 최소 봉 수 — 미만이면 백테스트를 생략한다(degrade)
  min_history: 60
  # RRG 윈도우 스윕 후보 (rs=mom 동일값, 14=현행 config 값)
  window_candidates: [8, 10, 14, 20, 26]

disclaimer: >
  주의: 신호 '확인' 도구이며 예측이 아님. 여러 신호 합의 시 신뢰. 투자자문 아님.
